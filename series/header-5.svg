<svg viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      svg {
        background: var(--bg-secondary, #ffffff);
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="var(--bg-secondary, #ffffff)"/>

  <!-- Hub-and-spoke assembly: components in various states of connection -->

  <!-- Central hub -->
  <circle cx="600" cy="120" r="12" fill="var(--svg-fill, #1a1a1a)" opacity="0.8"/>

  <!-- Connected spoke 1 (left) - fully solid -->
  <line x1="600" y1="120" x2="200" y2="120" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="200" cy="120" r="20" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="200" cy="120" r="12" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.3"/>

  <!-- Connected spoke 2 (top-left) -->
  <line x1="600" y1="120" x2="350" y2="40" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="350" cy="40" r="20" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="350" cy="40" r="12" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.3"/>

  <!-- Connected spoke 3 (top-right) -->
  <line x1="600" y1="120" x2="850" y2="50" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="850" cy="50" r="20" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="850" cy="50" r="12" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.3"/>

  <!-- Connected spoke 4 (right) -->
  <line x1="600" y1="120" x2="1000" y2="120" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="1000" cy="120" r="20" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <circle cx="1000" cy="120" r="12" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.3"/>

  <!-- Partially connected spoke (bottom-left) - dashed line -->
  <line x1="600" y1="120" x2="380" y2="200" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  <circle cx="380" cy="200" r="20" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  <circle cx="380" cy="200" r="12" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.15"/>

  <!-- Floating node (bottom-right) - not yet connected, approaching -->
  <circle cx="820" cy="210" r="20" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.5"/>
  <circle cx="820" cy="210" r="12" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.2"/>

  <!-- Floating node (top) - approaching -->
  <circle cx="600" cy="30" r="20" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="30" r="12" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.15"/>

  <!-- Ghost line indicating trajectory for floating node -->
  <path d="M 600 30 Q 600 70 600 120" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1" opacity="0.2" stroke-dasharray="2,3"/>

  <!-- Subtle motion arrow near floating bottom-right node -->
  <path d="M 750 200 L 790 210" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M 790 210 L 785 205 M 790 210 L 792 218" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Accent glow around central hub -->
  <circle cx="600" cy="120" r="50" fill="var(--svg-fill, #1a1a1a)" opacity="0.03"/>
</svg>
