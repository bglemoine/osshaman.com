<svg viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      svg {
        background: var(--bg-secondary, #ffffff);
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="var(--bg-secondary, #ffffff)"/>

  <!-- Scattered lines converging through a narrow channel into focused order -->

  <!-- LEFT: Scattered, chaotic lines -->
  <line x1="50" y1="30" x2="120" y2="90" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="80" x2="140" y2="40" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="60" x2="130" y2="140" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>
  <line x1="90" y1="120" x2="150" y2="70" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="150" x2="140" y2="100" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>

  <line x1="50" y1="170" x2="130" y2="210" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>
  <line x1="95" y1="190" x2="145" y2="160" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>
  <line x1="75" y1="210" x2="155" y2="190" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.6"/>

  <!-- Slightly more order in middle-left -->
  <line x1="200" y1="50" x2="280" y2="80" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.65"/>
  <line x1="210" y1="90" x2="290" y2="120" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.65"/>
  <line x1="220" y1="130" x2="300" y2="160" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.65"/>
  <line x1="230" y1="170" x2="310" y2="200" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="1.5" opacity="0.65"/>

  <!-- THE CHANNEL: Narrowing constraint -->
  <path d="M 350 30 L 400 80 L 400 160 L 350 210" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.7"/>
  <path d="M 400 80 L 480 100 L 480 140 L 400 160" fill="none" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.7"/>

  <!-- RIGHT: Parallel, focused, organized lines -->
  <line x1="520" y1="100" x2="1100" y2="100" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <line x1="520" y1="120" x2="1100" y2="120" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>
  <line x1="520" y1="140" x2="1100" y2="140" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="2" opacity="0.8"/>

  <!-- Secondary parallel lines for emphasis -->
  <line x1="520" y1="95" x2="1100" y2="95" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="0.75" opacity="0.4"/>
  <line x1="520" y1="125" x2="1100" y2="125" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="0.75" opacity="0.4"/>
  <line x1="520" y1="145" x2="1100" y2="145" stroke="var(--svg-stroke, #1a1a1a)" stroke-width="0.75" opacity="0.4"/>

  <!-- Subtle fill accent indicating the constraint zone -->
  <rect x="340" y="60" width="160" height="120" fill="var(--svg-fill-light, #e0e0e0)" opacity="0.08"/>

  <!-- Light radial glow on right to show clarity -->
  <circle cx="900" cy="120" r="400" fill="var(--svg-fill, #1a1a1a)" opacity="0.02"/>
</svg>
