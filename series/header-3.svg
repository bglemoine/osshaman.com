  <rect x="500" y="167" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.4" stroke-dasharray="4,4"/>
  <rect x="580" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="660" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="740" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="820" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="900" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <!-- Rotated -->
  <g transform="translate(1000, 190) rotate(3, 20, 20)">
    <rect x="0" y="0" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Checkmarks over first two boxes -->
  <path d="M 110 60 L 122 74 L 134 54" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M 190 60 L 202 74 L 214 54" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
