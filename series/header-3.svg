  <!-- Slightly off -->
  <rect x="340" y="47" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.7"/>
  <rect x="420" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="500" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="580" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="660" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="740" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="820" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="900" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="980" y="50" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>

  <!-- Row 2 -->
  <rect x="100" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="180" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="260" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="340" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <!-- Misaligned -->
  <rect x="422" y="107" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.65"/>
  <rect x="500" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="580" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="660" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="740" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="820" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="900" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="980" y="110" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>

