  <rect x="100" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="180" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="260" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="340" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
  <rect x="420" y="170" width="40" height="40" fill="none" stroke="var(--svg-fill, #828a9b)" stroke-width="2" opacity="0.85"/>
